name: Build Spotify Toolkit EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build EXE with Secrets
      shell: pwsh
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
      run: |
        # Determinar archivo principal
        $sourceFile = "main.py"
        if (!(Test-Path $sourceFile)) { $sourceFile = "main_gui.py" }
        
        # Inyectar credenciales para Plug & Play
        $content = Get-Content $sourceFile -Raw
        $content = $content -replace 'load_dotenv\(\) # \[CREDENTIALS_MARKER\]', "os.environ['SPOTIFY_CLIENT_ID']='${env:SPOTIFY_CLIENT_ID}'; os.environ['SPOTIFY_CLIENT_SECRET']='${env:SPOTIFY_CLIENT_SECRET}'; os.environ['SPOTIFY_REDIRECT_URI']='${env:SPOTIFY_REDIRECT_URI}'"
        Set-Content main_build.py $content

        # Obtener ruta de customtkinter para asegurar que se incluya
        $ctkPath = python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))"
        
        # Construir comandos de data
        $dataArgs = @()
        $folders = @("delete_duplicates", "artist_extractor", "reorder_tracks", "separate_artists", "separate_genres", "smart_shuffle", "playlist_time", "top_tracks_generator", "mood_mixer", "utils")
        foreach ($f in $folders) {
            if (Test-Path $f) { $dataArgs += "--add-data `"$f;$f`"" }
        }
        # Incluir específicamente los archivos de customtkinter
        $dataArgs += "--add-data `"$ctkPath;customtkinter`""

        # Ejecución de PyInstaller ultra-explícita
        python -m PyInstaller --noconfirm --onefile --windowed --name "SpotifyToolkit" `
          --hidden-import=spotipy `
          --hidden-import=customtkinter `
          --hidden-import=difflib `
          --hidden-import=PIL.Image `
          --hidden-import=PIL.ImageTk `
          $dataArgs `
          main_build.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotifyToolkit-EXE
        path: dist/SpotifyToolkit.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotifyToolkit.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
