name: Build Spotify Toolkit EXE

on:
  push:
    branches: [ Develop ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller spotipy python-dotenv customtkinter pillow darkdetect

    - name: Build EXE with Secrets
      shell: pwsh
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
      run: |
        # Determinar archivo principal (soporte para ambos nombres)
        $sourceFile = "main.py"
        if (!(Test-Path $sourceFile)) { $sourceFile = "main_gui.py" }
        Write-Host "Inyectando credenciales en: $sourceFile"

        # Inyectar credenciales para Plug & Play
        $content = Get-Content $sourceFile -Raw
        $content = $content -replace 'load_dotenv\(\) # \[CREDENTIALS_MARKER\]', "os.environ['SPOTIFY_CLIENT_ID']='${env:SPOTIFY_CLIENT_ID}'; os.environ['SPOTIFY_CLIENT_SECRET']='${env:SPOTIFY_CLIENT_SECRET}'; os.environ['SPOTIFY_REDIRECT_URI']='${env:SPOTIFY_REDIRECT_URI}'"
        Set-Content main_build.py $content

        # Lista de carpetas a incluir (soporta nombres viejos y nuevos)
        $potentialFolders = @(
            "delete_duplicates", "Delete Duplicates",
            "artist_extractor", "Artist Extractor",
            "reorder_tracks", "Reorder",
            "separate_artists", "Separate Artists",
            "separate_genres", "Separate Genres",
            "smart_shuffle", "Shuffle",
            "playlist_time", "Playlist Time",
            "top_tracks_generator", "Top Tracks Generator",
            "mood_mixer", "Mood Mixer",
            "metadata_export", "metadata_export",
            "utils", "utils"
        )

        $dataArgs = @()
        for ($i=0; $i -lt $potentialFolders.Length; $i+=2) {
            $newDir = $potentialFolders[$i]
            $oldDir = $potentialFolders[$i+1]
            if (Test-Path $newDir) { 
                $dataArgs += "--add-data"
                $dataArgs += "$newDir;$newDir"
            } elseif (Test-Path $oldDir) {
                $dataArgs += "--add-data"
                $dataArgs += "$oldDir;$oldDir"
            }
        }

        # Localizar customtkinter para incluirlo explícitamente y evitar ModuleNotFoundError
        $ctkPath = python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))"
        $dataArgs += "--add-data"
        $dataArgs += "$ctkPath;customtkinter"

        # Ejecución de PyInstaller con splatting (@dataArgs) para evitar errores de parseo en PowerShell
        & python -m PyInstaller --noconfirm --onefile --windowed --name "SpotifyToolkit" `
          --hidden-import=spotipy `
          --hidden-import=customtkinter `
          --hidden-import=difflib `
          --hidden-import=PIL.Image `
          --hidden-import=PIL.ImageTk `
          --hidden-import=darkdetect `
          @dataArgs `
          main_build.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotifyToolkit-EXE
        path: dist/SpotifyToolkit.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotifyToolkit.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
