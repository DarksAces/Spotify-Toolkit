name: Build Spotify Toolkit EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller spotipy python-dotenv customtkinter pillow

    - name: Build EXE with Secrets
      shell: pwsh
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
      run: |
        $mainMenu = Get-Content main_gui.py -Raw
        $mainMenu = $mainMenu -replace 'load_dotenv\(\) # \[CREDENTIALS_MARKER\]', "os.environ['SPOTIFY_CLIENT_ID']='${env:SPOTIFY_CLIENT_ID}'; os.environ['SPOTIFY_CLIENT_SECRET']='${env:SPOTIFY_CLIENT_SECRET}'; os.environ['SPOTIFY_REDIRECT_URI']='${env:SPOTIFY_REDIRECT_URI}'"
        Set-Content main_gui_build.py $mainMenu

        pyinstaller --noconfirm --onefile --windowed --name "SpotifyToolkit" `
          --hidden-import=spotipy `
          --hidden-import=customtkinter `
          --add-data "Delet Duplicates;Delet Duplicates" `
          --add-data "Extraer Artistas;Extraer Artistas" `
          --add-data "Reorder;Reorder" `
          --add-data "Separate Artists;Separate Artists" `
          --add-data "Separate Genres;Separate Genres" `
          --add-data "Shufle;Shufle" `
          --add-data "Time;Time" `
          --add-data "Top Tracks;Top Tracks" `
          main_gui_build.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotifyToolkit-EXE
        path: dist/SpotifyToolkit.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotifyToolkit.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
