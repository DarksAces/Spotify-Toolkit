name: Build Spotify Toolkit EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build EXE with Secrets
      shell: pwsh
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
      run: |
        # Use main.py as the source for the build
        if (Test-Path main.py) {
            $mainMenu = Get-Content main.py -Raw
            $mainMenu = $mainMenu -replace 'load_dotenv\(\) # \[CREDENTIALS_MARKER\]', "os.environ['SPOTIFY_CLIENT_ID']='${env:SPOTIFY_CLIENT_ID}'; os.environ['SPOTIFY_CLIENT_SECRET']='${env:SPOTIFY_CLIENT_SECRET}'; os.environ['SPOTIFY_REDIRECT_URI']='${env:SPOTIFY_REDIRECT_URI}'"
            Set-Content main_build.py $mainMenu
        } else {
            Write-Error "main.py not found!"
            exit 1
        }

        # Build with PyInstaller
        python -m PyInstaller --noconfirm --onefile --windowed --name "SpotifyToolkit" `
          --hidden-import=spotipy `
          --hidden-import=customtkinter `
          --hidden-import=difflib `
          --add-data "delete_duplicates;delete_duplicates" `
          --add-data "artist_extractor;artist_extractor" `
          --add-data "reorder_tracks;reorder_tracks" `
          --add-data "separate_artists;separate_artists" `
          --add-data "separate_genres;separate_genres" `
          --add-data "smart_shuffle;smart_shuffle" `
          --add-data "playlist_time;playlist_time" `
          --add-data "top_tracks_generator;top_tracks_generator" `
          --add-data "mood_mixer;mood_mixer" `
          --add-data "utils;utils" `
          main_build.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotifyToolkit-EXE
        path: dist/SpotifyToolkit.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotifyToolkit.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
