name: Build Spotify Toolkit EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with Secrets
      shell: pwsh
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
      run: |
        # Usamos Get-ChildItem para ver dónde estamos y qué archivos hay si falla
        pwd
        ls

        # Determinar cuál es el archivo principal (por si no se ha subido el renombrado)
        $sourceFile = "main.py"
        if (!(Test-Path $sourceFile)) { $sourceFile = "main_gui.py" }
        
        if (Test-Path $sourceFile) {
            $content = Get-Content $sourceFile -Raw
            $content = $content -replace 'load_dotenv\(\) # \[CREDENTIALS_MARKER\]', "os.environ['SPOTIFY_CLIENT_ID']='${env:SPOTIFY_CLIENT_ID}'; os.environ['SPOTIFY_CLIENT_SECRET']='${env:SPOTIFY_CLIENT_SECRET}'; os.environ['SPOTIFY_REDIRECT_URI']='${env:SPOTIFY_REDIRECT_URI}'"
            Set-Content main_build.py $content
        } else {
            Write-Error "No se encontró el archivo principal (main.py o main_gui.py)"
            exit 1
        }

        # Definir carpetas de datos (compatibilidad con nombres viejos y nuevos)
        $dataArgs = @()
        $folders = @(
            "delete_duplicates", "Delete Duplicates",
            "artist_extractor", "Artist Extractor",
            "reorder_tracks", "Reorder",
            "separate_artists", "Separate Artists",
            "separate_genres", "Separate Genres",
            "smart_shuffle", "Shuffle",
            "playlist_time", "Playlist Time",
            "top_tracks_generator", "Top Tracks Generator",
            "mood_mixer", "Mood Mixer",
            "utils", "utils"
        )
        
        for ($i=0; $i -lt $folders.Length; $i+=2) {
            $dir = $folders[$i]
            $oldDir = $folders[$i+1]
            if (Test-Path $dir) { $dataArgs += "--add-data `"$dir;$dir`"" }
            elseif (Test-Path $oldDir) { $dataArgs += "--add-data `"$oldDir;$oldDir`"" }
        }

        # Ejecutar PyInstaller con los argumentos dinámicos
        $cmd = "pyinstaller --noconfirm --onefile --windowed --name `"SpotifyToolkit`" --hidden-import=spotipy --hidden-import=customtkinter --hidden-import=difflib " + ($dataArgs -join " ") + " main_build.py"
        Invoke-Expression $cmd

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotifyToolkit-EXE
        path: dist/SpotifyToolkit.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpotifyToolkit.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
